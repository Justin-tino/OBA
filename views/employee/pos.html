<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS — OBA System</title>
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    .pos-layout { display: grid; grid-template-columns: 1fr 380px; gap: 24px; min-height: calc(100vh - 80px); }
    .pos-left { display: flex; flex-direction: column; gap: 16px; }
    .pos-right { background: var(--white); border-radius: var(--radius); border: 1px solid var(--gray-200); display: flex; flex-direction: column; position: sticky; top: 90px; max-height: calc(100vh - 100px); }
    .pos-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-200); }
    .pos-header h3 { margin: 0; font-size: 1.1rem; }
    .pos-items { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .pos-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--gray-100); }
    .pos-item-info { flex: 1; }
    .pos-item-name { font-weight: 600; font-size: 0.85rem; }
    .pos-item-price { font-size: 0.78rem; color: var(--gray-500); }
    .pos-item-qty { display: flex; align-items: center; gap: 6px; }
    .pos-item-qty input { width: 50px; text-align: center; padding: 4px; border: 1px solid var(--gray-200); border-radius: 4px; font-size: 0.85rem; }
    .pos-item-total { font-weight: 700; font-size: 0.9rem; min-width: 70px; text-align: right; }
    .pos-item-remove { color: var(--danger); cursor: pointer; background: none; border: none; font-size: 1.1rem; }
    .pos-summary { padding: 16px 20px; border-top: 2px solid var(--gray-200); }
    .pos-summary-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.9rem; }
    .pos-summary-row.total { font-weight: 800; font-size: 1.2rem; border-top: 1px solid var(--gray-200); padding-top: 8px; margin-top: 8px; }
    .pos-actions { padding: 16px 20px; border-top: 1px solid var(--gray-200); display: flex; flex-direction: column; gap: 10px; }
    .search-bar { display: flex; gap: 10px; }
    .search-bar input { flex: 1; }
    .scanner-wrap { background: var(--gray-50); border-radius: var(--radius); padding: 16px; text-align: center; }
    .scanner-wrap #scanner { width: 100%; max-width: 320px; margin: 0 auto; }
    .scanner-wrap video { border-radius: 8px; }
    .payment-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .payment-methods button { padding: 10px; border: 2px solid var(--gray-200); border-radius: var(--radius-sm); background: var(--white); cursor: pointer; font-weight: 600; font-size: 0.82rem; transition: 0.2s; }
    .payment-methods button.active { border-color: var(--green); background: var(--green-light); }
    .payment-methods button:hover { border-color: var(--green); }
    .payment-input { margin-top: 12px; }
    .payment-input input { font-size: 1.5rem; font-weight: 800; text-align: center; padding: 14px; }
    .change-display { text-align: center; font-size: 1.8rem; font-weight: 800; color: var(--green); padding: 12px 0; }
    .change-display.negative { color: var(--danger); }
    .entity-select { margin-bottom: 12px; }
    @media (max-width: 900px) { .pos-layout { grid-template-columns: 1fr; } .pos-right { position: static; max-height: none; } }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo-area">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:rgba(255,255,255,0.9);margin-bottom:8px"><path d="M11 20A7 7 0 0 1 9.8 6.9C15.5 4.9 17 3.5 19 2c1 2 2 4.5 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
      <div class="org-name">Office of Business Affairs</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Generated Dynamically based on user role -->
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">U</div>
        <div>
          <div class="sidebar-user-name" id="sidebarName">Loading...</div>
          <div class="sidebar-user-role">Logged in as:</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar topbar-green">
      <div class="flex-c gap-12">
        <button class="btn btn-ghost btn-icon" id="hamburger" style="color:#fff"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="topbar-title">Point of Sale</span>
      </div>
      <div class="topbar-actions">
        <div class="notif-bell" id="notifBell" onclick="toggleNotifDropdown()">
          <svg width="20" height="20" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-count" id="notifCount" style="display:none">0</span>
          <div class="notif-dropdown" id="notifDropdown"></div>
        </div>
        <button class="profile-btn"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg> Profile</button>
      </div>
    </div>

    <div class="page-content">
      <div class="pos-layout">
        <div class="pos-left">
          <div class="card" style="padding:20px">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
              <div class="form-group" style="margin:0;flex:1">
                <select id="posBiz" class="form-control" onchange="switchBiz()">
                  <option value="RENTAL">Rental</option>
                  <option value="BUSINESS">Business</option>
                  <option value="AGRI">Agriculture</option>
                  <option value="NON_AGRI">Non-Agriculture</option>
                </select>
              </div>
              <div class="form-group" style="margin:0;flex:1">
                <select id="posEntity" class="form-control">
                  <option value="">All Entities</option>
                </select>
              </div>
            </div>
            <div class="search-bar">
              <input type="text" id="barcodeInput" class="form-control" placeholder="Scan barcode or search product..." autofocus>
              <button class="btn btn-primary" onclick="searchProduct()">Search</button>
              <button class="btn btn-outline" onclick="toggleScanner()">Scan QR</button>
            </div>
            <div id="productResults" style="margin-top:12px;display:none"></div>
          </div>
          <div class="scanner-wrap" id="scannerWrap" style="display:none">
            <div id="scanner"></div>
            <p style="font-size:0.82rem;color:var(--gray-500);margin-top:8px">Position QR code or barcode in front of camera</p>
            <button class="btn btn-outline btn-sm" onclick="stopScanner()">Stop Scanner</button>
          </div>
          <div class="card" style="padding:20px">
            <div class="card-header" style="padding:0 0 12px 0">
              <span class="card-title">Quick Products</span>
            </div>
            <div id="quickProducts" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;max-height:300px;overflow-y:auto"></div>
          </div>
        </div>

        <div class="pos-right" id="cartPanel">
          <div class="pos-header">
            <h3>Shopping Cart</h3>
          </div>
          <div class="pos-items" id="cartItems">
            <div class="empty-state" style="padding:30px 10px"><h3>Cart is empty</h3><p>Search or scan products to add</p></div>
          </div>
          <div class="pos-summary">
            <div class="pos-summary-row"><span>Subtotal</span><span id="cartSubtotal">₱0.00</span></div>
            <div class="pos-summary-row" id="taxRow" style="color:var(--gray-500);font-size:0.85rem"><span>Tax (0%)</span><span id="cartTax">₱0.00</span></div>
            <div class="pos-summary-row total"><span>Total</span><span id="cartTotal">₱0.00</span></div>
          </div>
          <div class="pos-actions">
            <div class="payment-methods">
              <button class="active" onclick="setPayment('cash')">Cash</button>
              <button onclick="setPayment('gcash')">GCash</button>
              <button onclick="setPayment('credit')">Credit</button>
              <button onclick="setPayment('check')">Check</button>
            </div>
            <div class="payment-input">
              <input type="number" id="amountPaid" class="form-control" placeholder="Amount received" step="0.01" min="0">
            </div>
            <div class="change-display" id="changeDisplay">₱0.00</div>
            <button class="btn btn-primary" style="width:100%;padding:14px;font-size:1.1rem" onclick="checkout()">
              Complete Sale
            </button>
            <button class="btn btn-outline" style="width:100%" onclick="clearCart()">Clear Cart</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="receiptModal">
  <div class="modal" style="max-width:360px">
    <div class="modal-header">
      <span class="modal-title">Receipt</span>
      <button class="modal-close" onclick="closeModal('receiptModal')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div id="receiptContent" style="padding:20px;text-align:center;font-size:0.82rem"></div>
    <div class="modal-footer" style="justify-content:center">
      <button class="btn btn-primary" onclick="printSection('receiptContent'); closeModal('receiptModal')">Print Receipt</button>
      <button class="btn btn-outline" onclick="closeModal('receiptModal')">Close</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
let cart = [];
let inventory = [];
let paymentMethod = 'cash';
let currentBiz = 'RENTAL';
let scanner = null;
const DEFAULT_TAX_RATES = { RENTAL: 12, BUSINESS: 12, AGRI: 0, NON_AGRI: 12 };
let taxRates = { ...DEFAULT_TAX_RATES };

async function fetchTaxRates() {
  try {
    const res = await API.get('/api/admin/taxes');
    if (res.success && res.data) {
      taxRates = { ...DEFAULT_TAX_RATES, ...res.data };
    }
  } catch (e) {
    console.warn('Failed to fetch tax rates:', e);
  }
}

function getTaxRate() {
  const rate = taxRates[currentBiz];
  if (rate === undefined || rate === null) {
    console.warn(`No tax rate for ${currentBiz}, using default`);
    return DEFAULT_TAX_RATES[currentBiz] || 0;
  }
  return Number(rate) || 0;
}

document.addEventListener('DOMContentLoaded', async () => {
  currentBiz = getBizId() || 'RENTAL';
  await fetchTaxRates();
  document.getElementById('posBiz').value = currentBiz;
  getCurrentUser().then(u => {
    if (u) {
      document.getElementById('sidebarName').textContent = u.name;
      document.querySelector('.sidebar-user-role').textContent = 'Logged in as: ' + formatRole(u.role);
      document.getElementById('sidebarAvatar').textContent = u.name.charAt(0).toUpperCase();

      const nav = document.getElementById('sidebarNav');
      const bizParam = `?biz=${currentBiz}`;

      if (u.role === 'employee' || u.role === 'manager') {
        // Employee/Manager Sidebar
        nav.innerHTML = `
          <a class="nav-item" href="/employee/dashboard${bizParam}"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg></span> Dashboard</a>
          <a class="nav-item active" href="/employee/pos${bizParam}"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span> POS</a>
          <a class="nav-item" href="/employee/inventory${bizParam}"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg></span> Inventory</a>
          <a class="nav-item" href="/employee/sales${bizParam}"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></span> Sales</a>
          <a class="nav-item" href="/employee/expenses${bizParam}"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg></span> Expenses</a>
          <a class="nav-item" href="/employee/reports${bizParam}"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span> Reports</a>
          <a class="nav-item" href="/logout"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span> Logout</a>
        `;
      } else {
        // Admin/Super Admin/Viewer Sidebar
        nav.innerHTML = `
          <a class="nav-item" href="/admin/about"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></span> About</a>
          <a class="nav-item" href="/admin/dashboard"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span> Dashboard</a>
          <a class="nav-item" href="/admin/business"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg></span> Business</a>
          <a class="nav-item active" href="/employee/pos${bizParam}"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span> POS</a>
          <a class="nav-item" href="/admin/sales"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></span> Sales</a>
          <a class="nav-item" href="/admin/reports"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span> Reports</a>
          ${u.role === 'super_admin' || u.role === 'admin' ? `<a class="nav-item" href="/admin/users"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Manage Users</a>` : ''}
          <a class="nav-item" href="/logout"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span> Logout</a>
        `;
      }
    }
  });
  loadInventory();
  loadEntities();

  // Enter key triggers search
  document.getElementById('barcodeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchProduct();
  });

  // Auto-compute change
  document.getElementById('amountPaid').addEventListener('input', updateChange);
});

function getBizId() {
  const p = new URLSearchParams(window.location.search);
  return p.get('biz') || 'RENTAL';
}

async function loadEntities() {
  try {
    const res = await API.get('/api/admin/businesses');
    if (res.success) {
      const filtered = res.data.filter(e => e.categoryId === currentBiz);
      const sel = document.getElementById('posEntity');
      sel.innerHTML = '<option value="">All Entities</option>' +
        filtered.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
    }
  } catch(e) {}
}

async function loadInventory() {
  try {
    const res = await API.get('/api/inventory?biz=' + currentBiz);
    if (res.success) {
      inventory = res.data || [];
      renderQuickProducts();
    }
  } catch(e) { console.error(e); }
}

function renderQuickProducts() {
  const el = document.getElementById('quickProducts');
  if (!inventory.length) {
    el.innerHTML = '<div style="color:var(--gray-400);font-size:0.82rem;grid-column:1/-1;text-align:center;padding:20px">No products found</div>';
    return;
  }
  el.innerHTML = inventory.filter(p => parseInt(p.quantity||0) > 0).slice(0, 20).map(p => `
    <div class="card" style="cursor:pointer;padding:12px;text-align:center;border:1px solid var(--gray-200)" onclick="addToCart('${p.id}')">
      <div style="font-weight:600;font-size:0.82rem;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</div>
      <div style="font-weight:700;color:var(--green);font-size:0.9rem">&#8369;${parseFloat(p.sellingPrice||0).toLocaleString('en',{minimumFractionDigits:2})}</div>
    </div>`).join('');
}

function switchBiz() {
  currentBiz = document.getElementById('posBiz').value;
  loadInventory();
  loadEntities();
  clearCart();
}

function searchProduct() {
  const q = document.getElementById('barcodeInput').value.trim().toLowerCase();
  if (!q) return;
  const product = inventory.find(p =>
    p.name.toLowerCase().includes(q) ||
    p.id.toLowerCase().includes(q) ||
    (p.barcode && p.barcode === q)
  );
  if (product) {
    addToCart(product.id);
    document.getElementById('barcodeInput').value = '';
  } else {
    Toast.warning('Product not found: ' + q);
  }
}

function addToCart(productId) {
  const product = inventory.find(p => p.id === productId);
  if (!product) return;
  if (parseInt(product.quantity||0) <= 0) {
    Toast.error(product.name + ' is out of stock');
    return;
  }
  const existing = cart.find(c => c.id === productId);
  if (existing) {
    if (existing.qty >= parseInt(product.quantity||0)) {
      Toast.warning('Not enough stock');
      return;
    }
    existing.qty++;
  } else {
    cart.push({
      id: product.id,
      name: product.name,
      unitPrice: parseFloat(product.sellingPrice||0),
      qty: 1,
      maxQty: parseInt(product.quantity||0)
    });
  }
  renderCart();
  Toast.success(product.name + ' added to cart');
}

function removeFromCart(productId) {
  cart = cart.filter(c => c.id !== productId);
  renderCart();
}

function updateQty(productId, qty) {
  const item = cart.find(c => c.id === productId);
  if (!item) return;
  qty = parseInt(qty) || 1;
  if (qty <= 0) { removeFromCart(productId); return; }
  if (qty > item.maxQty) qty = item.maxQty;
  item.qty = qty;
  renderCart();
}

function renderCart() {
  const el = document.getElementById('cartItems');
  if (!cart.length) {
    el.innerHTML = '<div class="empty-state" style="padding:30px 10px"><h3>Cart is empty</h3><p>Search or scan products to add</p></div>';
    updateTotals();
    return;
  }
  el.innerHTML = cart.map(c => `
    <div class="pos-item">
      <div class="pos-item-info">
        <div class="pos-item-name">${c.name}</div>
        <div class="pos-item-price">&#8369;${c.unitPrice.toLocaleString('en',{minimumFractionDigits:2})} each</div>
      </div>
      <div class="pos-item-qty">
        <button class="btn btn-ghost btn-sm" onclick="updateQty('${c.id}',${c.qty-1})" style="padding:2px 6px">−</button>
        <input type="number" value="${c.qty}" min="1" max="${c.maxQty}" onchange="updateQty('${c.id}',this.value)">
        <button class="btn btn-ghost btn-sm" onclick="updateQty('${c.id}',${c.qty+1})" style="padding:2px 6px">+</button>
      </div>
      <div class="pos-item-total">&#8369;${(c.unitPrice * c.qty).toLocaleString('en',{minimumFractionDigits:2})}</div>
      <button class="pos-item-remove" onclick="removeFromCart('${c.id}')">×</button>
    </div>`).join('');
  updateTotals();
}

function updateTotals() {
  const subtotal = cart.reduce((a,c) => a + (c.unitPrice * c.qty), 0);
  const rate = getTaxRate();
  const taxAmount = subtotal * (rate / 100);
  const total = subtotal + taxAmount;

  document.getElementById('cartSubtotal').innerHTML = '&#8369;' + subtotal.toLocaleString('en',{minimumFractionDigits:2});
  document.getElementById('taxRow').innerHTML = `<span>Tax (${rate}%)</span><span>&#8369;${taxAmount.toLocaleString('en',{minimumFractionDigits:2})}</span>`;
  document.getElementById('cartTotal').innerHTML = '&#8369;' + total.toLocaleString('en',{minimumFractionDigits:2});
  updateChange();
}

function updateChange() {
  const subtotal = cart.reduce((a,c) => a + (c.unitPrice * c.qty), 0);
  const rate = getTaxRate();
  const taxAmount = subtotal * (rate / 100);
  const total = subtotal + taxAmount;

  const paid = parseFloat(document.getElementById('amountPaid').value) || 0;
  const change = paid - total;
  const el = document.getElementById('changeDisplay');
  el.innerHTML = change >= 0 ? '&#8369;' + change.toLocaleString('en',{minimumFractionDigits:2}) : 'Short: &#8369;' + Math.abs(change).toLocaleString('en',{minimumFractionDigits:2});
  el.className = 'change-display ' + (change >= 0 ? '' : 'negative');
}

function setPayment(method) {
  paymentMethod = method;
  document.querySelectorAll('.payment-methods button').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(method)));
}

function clearCart() {
  cart = [];
  renderCart();
  document.getElementById('amountPaid').value = '';
  updateChange();
}

async function checkout() {
  if (!cart.length) { Toast.warning('Cart is empty'); return; }
  const subtotal = cart.reduce((a,c) => a + (c.unitPrice * c.qty), 0);
  const rate = getTaxRate();
  const taxAmount = subtotal * (rate / 100);
  const total = subtotal + taxAmount;

  const paid = parseFloat(document.getElementById('amountPaid').value) || 0;
  if (paid < total) { Toast.warning('Insufficient payment'); return; }

  const entitySelect = document.getElementById('posEntity');
  const entityId = entitySelect.value;
  const entityName = entitySelect.options[entitySelect.selectedIndex]?.text || '';

  const data = {
    items: cart.map(c => ({ id: c.id, name: c.name, unitPrice: c.unitPrice, quantity: c.qty })),
    subtotal,
    taxRate: rate,
    taxAmount,
    total,
    paymentMethod,
    businessCategory: currentBiz,
    entityId,
    entityName,
    notes: 'POS Sale'
  };

  try {
    const res = await API.post('/api/sales', data);
    if (res.success) {
      const txn = res.data;
      const change = paid - total;
      document.getElementById('receiptContent').innerHTML = `
        <div style="border-bottom:1px dashed #ccc;padding-bottom:12px;margin-bottom:12px">
          <strong>OBA System</strong><br>
          <small>${new Date().toLocaleString()}</small><br>
          <small>TXN: ${txn.transactionId || txn.id}</small>
        </div>
        ${cart.map(c => `<div style="display:flex;justify-content:space-between;padding:3px 0"><span>${c.name} × ${c.qty}</span><span>&#8369;${(c.unitPrice*c.qty).toLocaleString('en',{minimumFractionDigits:2})}</span></div>`).join('')}
        <div style="border-top:1px dashed #ccc;margin-top:8px;padding-top:8px;display:flex;justify-content:space-between">
          <span>Subtotal</span><span>&#8369;${subtotal.toLocaleString('en',{minimumFractionDigits:2})}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:3px 0">
          <span>Tax (${rate}%)</span><span>&#8369;${taxAmount.toLocaleString('en',{minimumFractionDigits:2})}</span>
        </div>
        <div style="font-weight:700;display:flex;justify-content:space-between;padding:3px 0;border-top:1px solid #ccc">
          <span>Total</span><span>&#8369;${total.toLocaleString('en',{minimumFractionDigits:2})}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:3px 0">
          <span>Paid</span><span>&#8369;${paid.toLocaleString('en',{minimumFractionDigits:2})}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:3px 0;color:var(--green);font-weight:700">
          <span>Change</span><span>&#8369;${change.toLocaleString('en',{minimumFractionDigits:2})}</span>
        </div>
        <div style="border-top:1px dashed #ccc;margin-top:12px;padding-top:12px;font-size:0.78rem;color:var(--gray-500)">
          Payment: ${paymentMethod.toUpperCase()}<br>
          ${entityName ? 'Entity: ' + entityName : ''}
        </div>
      `;
      Toast.success('Sale completed!');
      clearCart();
      loadInventory();
      openModal('receiptModal');
    } else {
      Toast.error(res.message || 'Sale failed');
    }
  } catch(e) {
    Toast.error('Error processing sale');
  }
}

// QR/Barcode Scanner
function toggleScanner() {
  const wrap = document.getElementById('scannerWrap');
  if (wrap.style.display !== 'none') { stopScanner(); return; }
  wrap.style.display = 'block';
  startScanner();
}

function startScanner() {
  if (scanner) scanner.stop();
  scanner = new Html5Qrcode("scanner");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onScanSuccess
  ).catch(e => {
    Toast.error('Camera access denied or unavailable');
    document.getElementById('scannerWrap').style.display = 'none';
  });
}

function stopScanner() {
  if (scanner) { scanner.stop().catch(()=>{}); scanner = null; }
  document.getElementById('scannerWrap').style.display = 'none';
}

function onScanSuccess(decodedText) {
  stopScanner();
  // Try to find product by QR code (which contains product ID)
  const product = inventory.find(p => p.id === decodedText || p.qrCode === decodedText);
  if (product) {
    addToCart(product.id);
    Toast.success('Scanned: ' + product.name);
  } else {
    // Try as barcode input
    document.getElementById('barcodeInput').value = decodedText;
    searchProduct();
  }
}

window.addEventListener('beforeunload', () => { if (scanner) scanner.stop().catch(()=>{}); });
</script>
