<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — OBA System</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .notif-page-list { max-height: none; }
    .notif-page-item { display: flex; align-items: start; gap: 14px; padding: 16px 0; border-bottom: 1px solid var(--gray-200); transition: background 0.2s; }
    .notif-page-item:last-child { border-bottom: none; }
    .notif-page-item .np-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .notif-page-item .np-info { flex: 1; }
    .notif-page-item .np-title { font-weight: 600; font-size: 0.9rem; }
    .notif-page-item .np-msg { font-size: 0.82rem; color: var(--gray-600); margin-top: 2px; }
    .notif-page-item .np-time { font-size: 0.72rem; color: var(--gray-400); margin-top: 4px; }
    .notif-page-item .np-priority { display: inline-block; padding: 1px 8px; border-radius: 8px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
    .notif-page-item .np-priority.critical { background: #fce4e4; color: #c0392b; }
    .notif-page-item .np-priority.warning { background: #fef5e7; color: #d4a017; }
    .notif-page-item .np-priority.info { background: #e8f5e9; color: #2d6a2e; }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo-area">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:rgba(255,255,255,0.9);margin-bottom:8px"><path d="M11 20A7 7 0 0 1 9.8 6.9C15.5 4.9 17 3.5 19 2c1 2 2 4.5 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
      <div class="org-name">Office of Business Affairs</div>
    </div>
    <nav class="sidebar-nav" id="mgrNav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">M</div>
        <div><div class="sidebar-user-name" id="sidebarName">Loading...</div><div class="sidebar-user-role">Logged in as:</div></div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar topbar-green">
      <div class="flex-c gap-12">
        
        <button class="btn btn-ghost btn-icon" id="hamburger" style="color:#fff"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.9C15.5 4.9 17 3.5 19 2c1 2 2 4.5 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg></button>
        <span class="topbar-title">Notifications</span>
      </div>
      <div class="topbar-actions">
        <button class="profile-btn"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg> Profile</button>
      </div>
    </div>

    <div class="page-content">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--gray-200)">
          <span class="card-title">All Notifications</span>
          <span id="notifCountBadge" style="background:var(--green);color:#fff;padding:2px 12px;border-radius:12px;font-size:0.78rem;font-weight:600">0</span>
        </div>
        <div id="notifList" style="padding:0 16px">
          <div class="empty-state"><h3>No notifications</h3></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
let BIZ = 'RENTAL';

function buildNav() {
  document.getElementById('mgrNav').innerHTML = `
    <a class="nav-item" href="/manager/dashboard"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span> Dashboard</a>
    <a class="nav-item" href="/manager/inventory"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span> Inventory</a>
    <a class="nav-item" href="/manager/sales"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></span> Sales</a>
    <a class="nav-item" href="/manager/reports"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span> Reports</a>
    <a class="nav-item" href="/manager/employees"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Manage Employees</a>
    <a class="nav-item active" href="/manager/notifications"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span> Notifications</a>
    <a class="nav-item" href="javascript:void(0)" onclick="confirm('Are you sure you want to logout?', () => window.location.href='/logout');"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span> Logout</a>
  `;
}

const ICONS = {
  inventory: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>',
  deadline: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  low_stock: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
};

async function loadNotifications() {
  try {
    const res = await API.get('/api/admin/notifications');
    if (!res.success) return;
    let notifs = res.data || [];
    // Filter notifications relevant to this manager's business
    notifs = notifs.filter(n => !n.businessCategory || n.businessCategory === 'all' || n.businessCategory === BIZ);
    notifs.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    const el = document.getElementById('notifList');
    document.getElementById('notifCountBadge').textContent = notifs.length;
    if (!notifs.length) {
      el.innerHTML = '<div class="empty-state"><h3>No notifications</h3></div>';
      return;
    }
    el.innerHTML = '<div class="notif-page-list">' + notifs.map(n => {
      const icon = ICONS[n.type] || ICONS.deadline;
      const priority = n.priority || 'info';
      const iconBg = priority === 'critical' ? '#fce4e4' : priority === 'warning' ? '#fef5e7' : '#e8f5e9';
      const iconColor = priority === 'critical' ? '#c0392b' : priority === 'warning' ? '#d4a017' : '#2d6a2e';
      return `<div class="notif-page-item">
        <div class="np-icon" style="background:${iconBg};color:${iconColor}">${icon}</div>
        <div class="np-info">
          <div class="np-title">${n.title || 'Notification'}</div>
          <div class="np-msg">${n.message || ''}</div>
          <div class="np-time"><span class="np-priority ${priority}">${priority}</span> ${n.createdAt ? new Date(n.createdAt).toLocaleString() : ''} by ${n.createdByName || n.createdBy || 'system'}</div>
        </div>
      </div>`;
    }).join('') + '</div>';
  } catch(e) { /* skip */ }
}

async function initPage() {
  buildNav();
  const u = await getCurrentUser();
  if (u) {
    const bizAccess = u.businessAccess || [];
    BIZ = bizAccess.includes('all') ? 'RENTAL' : (bizAccess[0] || 'RENTAL');
    document.getElementById('sidebarName').textContent = u.name;
    document.querySelector('.sidebar-user-role').textContent = 'Logged in as: ' + formatRole(u.role);
    document.getElementById('sidebarAvatar').textContent = u.name.charAt(0).toUpperCase();
  }
  loadNotifications();
}

document.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
