<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — OBA System</title>
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .report-tabs { display: flex; gap: 0; margin-bottom: 20px; background: var(--white); border-radius: 10px; border: 1px solid var(--gray-200); overflow: hidden; }
    .report-tab { flex: 1; padding: 14px 16px; text-align: center; font-weight: 600; font-size: 0.82rem; cursor: pointer; border-right: 1px solid var(--gray-200); transition: all 0.2s; color: var(--gray-600); background: var(--white); }
    .report-tab:last-child { border-right: none; }
    .report-tab:hover { background: var(--gray-50); }
    .report-tab.active { color: #fff; background: linear-gradient(90deg, #3a8c3b, #2d6a2e); }
    .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 1024px) { .report-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo-area">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:rgba(255,255,255,0.9);margin-bottom:8px"><path d="M11 20A7 7 0 0 1 9.8 6.9C15.5 4.9 17 3.5 19 2c1 2 2 4.5 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
      <div class="org-name">Office of Business Affairs</div>
    </div>
    <nav class="sidebar-nav" id="mgrNav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">M</div>
        <div><div class="sidebar-user-name" id="sidebarName">Loading...</div><div class="sidebar-user-role">Logged in as:</div></div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar topbar-green">
      <div class="flex-c gap-12">
        
        <span class="topbar-title" id="topbarTitle">Financial Reports</span>
      </div>
      <div class="topbar-actions">
        <div class="notif-bell" id="notifBell" onclick="toggleNotifDropdown()">
          <svg width="20" height="20" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-count" id="notifCount" style="display:none">0</span>
          <div class="notif-dropdown" id="notifDropdown"></div>
        </div>
        <button class="profile-btn"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg> Profile</button>
      </div>
    </div>

    <div class="page-content">
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px;">
        <div><label class="form-label" style="font-size:0.78rem">Period</label>
          <select id="fPeriod" class="form-control" onchange="loadReports()" style="width:140px">
            <option value="month">This Month</option><option value="week">This Week</option><option value="year">This Year</option>
          </select>
        </div>
        <div style="margin-top:18px;display:flex;gap:8px;">
          <button class="btn btn-outline btn-sm" style="border-color:var(--green);color:var(--green)" onclick="exportReportPDF()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Export PDF</button>
          <button class="btn btn-outline btn-sm" style="border-color:var(--green);color:var(--green)" onclick="exportReportCSV()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Export CSV</button>
        </div>
      </div>

      <div class="report-tabs">
        <div class="report-tab active" onclick="switchTab('summary',this)">Summary</div>
        <div class="report-tab" onclick="switchTab('income',this)">Income Statement</div>
        <div class="report-tab" onclick="switchTab('cashflow',this)">Cash Flow</div>
        <div class="report-tab" onclick="switchTab('balance',this)">Balance Summary</div>
      </div>

      <div id="tab-summary" class="tab-panel">
        <div class="kpi-grid" style="grid-template-columns: repeat(4,1fr); margin-bottom:20px">
          <div class="kpi-card yellow"><div class="kpi-label">Total Revenue</div><div class="kpi-value" id="rRevenue">—</div></div>
          <div class="kpi-card danger"><div class="kpi-label">Total Expenses</div><div class="kpi-value" id="rExpenses" style="color:var(--danger)">—</div></div>
          <div class="kpi-card green"><div class="kpi-label">Net Profit</div><div class="kpi-value" id="rProfit" style="color:var(--green)">—</div></div>
          <div class="kpi-card black"><div class="kpi-label">ROI</div><div class="kpi-value" id="rROI">—</div></div>
        </div>
        <div class="report-grid">
          <div class="card"><div class="card-header"><span class="card-title">Revenue vs Expenses</span></div><div style="position:relative;height:250px;width:100%"><canvas id="revExpChart"></canvas></div></div>
          <div class="card"><div class="card-header"><span class="card-title">Expense Breakdown</span></div><div style="position:relative;height:250px;width:100%"><canvas id="expBreakChart"></canvas></div></div>
        </div>
      </div>

      <div id="tab-income" class="tab-panel" style="display:none">
        <div class="card"><div class="card-header"><span class="card-title">Income Statement</span></div>
        <div style="padding:20px;max-width:500px"><table class="fs-table" id="incomeTable"></table></div></div>
      </div>

      <div id="tab-cashflow" class="tab-panel" style="display:none">
        <div class="card"><div class="card-header"><span class="card-title">Cash Flow Statement</span></div>
        <div style="padding:20px;max-width:500px"><table class="fs-table" id="cashflowTable"></table></div></div>
      </div>

      <div id="tab-balance" class="tab-panel" style="display:none">
        <div class="card"><div class="card-header"><span class="card-title">Balance Summary</span></div>
        <div style="padding:20px;max-width:500px"><table class="fs-table" id="balanceTable"></table></div></div>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
let BIZ = 'RENTAL';
let reportData = {};
let revExpChart, expBreakChart;

function buildNav() {
  document.getElementById('mgrNav').innerHTML = `
    <a class="nav-item" href="/manager/dashboard"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span> Dashboard</a>
    <a class="nav-item" href="/manager/inventory"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span> Inventory</a>
    <a class="nav-item" href="/manager/sales"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></span> Sales</a>
    <a class="nav-item active" href="/manager/reports"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span> Reports</a>
    <a class="nav-item" href="/manager/employees"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Manage Employees</a>
    <a class="nav-item" href="/manager/notifications"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span> Notifications</a>
    <a class="nav-item" href="javascript:void(0)" onclick="confirm('Are you sure you want to logout?', () => window.location.href='/logout');"><span class="nav-icon"><svg width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span> Logout</a>
  `;
}

function fmtCurrency(n) { return '&#8369;' + parseFloat(n||0).toLocaleString('en',{minimumFractionDigits:2}); }
function pct(n) { return parseFloat(n||0).toFixed(1) + '%'; }

async function loadReports() {
  const period = document.getElementById('fPeriod').value;
  const [s, is, cf, bs] = await Promise.allSettled([
    API.get(`/api/reports/${BIZ}/summary?period=${period}`),
    API.get(`/api/reports/${BIZ}/income-statement?period=${period}`),
    API.get(`/api/reports/${BIZ}/cash-flow?period=${period}`),
    API.get(`/api/reports/${BIZ}/balance-summary`),
  ]);
  reportData = {
    summary: s.status === 'fulfilled' && s.value.success ? s.value.data : null,
    income: is.status === 'fulfilled' && is.value.success ? is.value.data : null,
    cashflow: cf.status === 'fulfilled' && cf.value.success ? cf.value.data : null,
    balance: bs.status === 'fulfilled' && bs.value.success ? bs.value.data : null,
  };
  if (!reportData.summary && !reportData.income && !reportData.cashflow && !reportData.balance) {
    Toast.error('No report data available for this business.');
    return;
  }
  renderSummary();
  renderIncome();
  renderCashflow();
  renderBalance();
}

function renderSummary() {
  const d = reportData.summary;
  if (!d) return;
  document.getElementById('rRevenue').innerHTML = fmtCurrency(d.revenue);
  document.getElementById('rExpenses').innerHTML = fmtCurrency(d.expenses);
  document.getElementById('rProfit').innerHTML = fmtCurrency(d.profit);
  document.getElementById('rProfit').style.color = d.profit >= 0 ? 'var(--green)' : 'var(--danger)';
  document.getElementById('rROI').textContent = pct(d.roi);
  if (revExpChart) revExpChart.destroy();
  if (expBreakChart) expBreakChart.destroy();
  revExpChart = new Chart(document.getElementById('revExpChart'), {
    type: 'bar', data: { labels: ['Revenue','Expenses'], datasets: [{ data: [d.revenue, d.expenses], backgroundColor: ['#2d6a2e','#e74c3c'], borderRadius: 6 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });
  const eb = d.expenseBreakdown || {};
  expBreakChart = new Chart(document.getElementById('expBreakChart'), {
    type: 'doughnut', data: { labels: ['Utilities','Suppliers','Salary','Other'], datasets: [{ data: [eb.utilities, eb.suppliers, eb.salary, eb.other], backgroundColor: ['#3498db','#e67e22','#2ecc71','#95a5a6'] }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
  });
}

function renderIncome() {
  const d = reportData.income;
  if (!d) return;
  document.getElementById('incomeTable').innerHTML = `    <tr><td>Sales Revenue (Net)</td><td style="text-align:right">${fmtCurrency(d.salesRevenue)}</td></tr>
    <tr><td>Taxes Collected (12%)</td><td style="text-align:right">${fmtCurrency(d.taxes)}</td></tr>
    <tr><td>Other Income</td><td style="text-align:right">${fmtCurrency(d.otherIncome)}</td></tr>
    <tr style="font-weight:700;border-top:2px solid var(--gray-300)"><td>Total Gross Revenue</td><td style="text-align:right">${fmtCurrency(d.totalRevenue)}</td></tr>
    <tr><td>Cost of Goods Sold</td><td style="text-align:right;color:var(--danger)">(${fmtCurrency(d.costOfGoods)})</td></tr>
    <tr><td>Operating Expenses</td><td style="text-align:right;color:var(--danger)">(${fmtCurrency(d.operatingExpenses)})</td></tr>
    <tr style="font-weight:700;border-top:2px solid var(--gray-300)"><td>Total Expenses</td><td style="text-align:right;color:var(--danger)">(${fmtCurrency(d.totalExpenses)})</td></tr>
    <tr style="font-weight:800;border-top:2px solid var(--black);color:${d.netIncome>=0?'var(--green)':'var(--danger)'}"><td>Net Income</td><td style="text-align:right">${fmtCurrency(d.netIncome)}</td></tr>`;
}

function renderCashflow() {
  const d = reportData.cashflow;
  if (!d) return;
  const oa = d.operatingActivities || {};
  const ia = d.investingActivities || {};
  document.getElementById('cashflowTable').innerHTML = `
    <tr><td colspan="2" style="font-weight:700;background:var(--gray-100)">Operating Activities</td></tr>
    <tr><td style="padding-left:20px">Sales Receipts</td><td style="text-align:right">${fmtCurrency(oa.salesReceipts)}</td></tr>
    <tr><td style="padding-left:20px">Expense Payments</td><td style="text-align:right;color:var(--danger)">(${fmtCurrency(oa.expensePayments)})</td></tr>
    <tr><td style="padding-left:20px;font-weight:600">Net Operating</td><td style="text-align:right;font-weight:600">${fmtCurrency(oa.netOperating)}</td></tr>
    <tr><td colspan="2" style="font-weight:700;background:var(--gray-100)">Investing Activities</td></tr>
    <tr><td style="padding-left:20px">Equipment Purchase</td><td style="text-align:right;color:var(--danger)">(${fmtCurrency(ia.equipmentPurchase)})</td></tr>
    <tr><td style="padding-left:20px;font-weight:600">Net Investing</td><td style="text-align:right;font-weight:600;color:var(--danger)">(${fmtCurrency(ia.netInvesting)})</td></tr>
    <tr style="font-weight:800;border-top:2px solid var(--black)"><td>Closing Balance</td><td style="text-align:right">${fmtCurrency(d.closingBalance)}</td></tr>`;
}

function renderBalance() {
  const d = reportData.balance;
  if (!d) return;
  const a = d.assets || {};
  const l = d.liabilities || {};
  document.getElementById('balanceTable').innerHTML = `
    <tr><td colspan="2" style="font-weight:700;background:var(--gray-100)">Assets</td></tr>
    <tr><td style="padding-left:20px">Cash</td><td style="text-align:right">${fmtCurrency(a.cash)}</td></tr>
    <tr><td style="padding-left:20px">Inventory</td><td style="text-align:right">${fmtCurrency(a.inventory)}</td></tr>
    <tr><td style="padding-left:20px">Receivables</td><td style="text-align:right">${fmtCurrency(a.receivables)}</td></tr>
    <tr style="font-weight:700;border-top:2px solid var(--gray-300)"><td>Total Assets</td><td style="text-align:right">${fmtCurrency(a.totalAssets)}</td></tr>
    <tr><td colspan="2" style="font-weight:700;background:var(--gray-100)">Liabilities</td></tr>
    <tr><td style="padding-left:20px">Payables</td><td style="text-align:right;color:var(--danger)">(${fmtCurrency(l.payables)})</td></tr>
    <tr style="font-weight:700"><td>Total Liabilities</td><td style="text-align:right;color:var(--danger)">(${fmtCurrency(l.totalLiabilities)})</td></tr>
    <tr style="font-weight:800;border-top:2px solid var(--black);color:var(--green)"><td>Equity</td><td style="text-align:right">${fmtCurrency(d.equity)}</td></tr>`;
}

function switchTab(tab, el) {
  document.querySelectorAll('.report-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';
}

function exportReportPDF() {
  const biz = BIZ;
  const period = document.getElementById('fPeriod').value;
  const d = reportData.summary || {};
  const content = `
    <html><head><title>Financial Report</title>
    <style>body{font-family:Arial,sans-serif;padding:30px;color:#000} table{width:100%;border-collapse:collapse;margin:10px 0} th,td{padding:8px 12px;text-align:left;border-bottom:1px solid #ddd} h2{color:#2d6a2e}</style></head>
    <body><h2>OBA Financial Report</h2>
    <p><strong>Business:</strong> ${biz} | <strong>Period:</strong> ${period}</p>
    <table><tr><td>Sales Revenue (Net)</td><td>${fmtCurrency(d.revenue||0)}</td></tr>
    <tr><td>Taxes Collected (12%)</td><td>${fmtCurrency(d.taxes||0)}</td></tr>
    <tr><td>Total Gross Revenue</td><td>${fmtCurrency((d.revenue||0) + (d.taxes||0))}</td></tr>
    <tr><td>Expenses</td><td>${fmtCurrency(d.expenses||0)}</td></tr>
    <tr><td>Net Profit</td><td>${fmtCurrency(d.profit||0)}</td></tr>
    <tr><td>ROI</td><td>${pct(d.roi||0)}</td></tr></table>
    <p><em>Generated by OBA System</em></p></body></html>`;
  const w = window.open('','_blank','width=800,height=600');
  if (!w) { Toast.error('Popup blocked. Please allow popups for this site.'); return; }
  w.document.write(content);
  w.document.close();
  w.focus();
  setTimeout(() => w.print(), 500);
}

function exportReportCSV() {
  const d = reportData.summary;
  if (!d) { Toast.warning('No data to export'); return; }
  const csv = `Category,Value\nSales Revenue (Net),${d.revenue||0}\nTaxes Collected,${d.taxes||0}\nGross Revenue,${(d.revenue||0)+(d.taxes||0)}\nExpenses,${d.expenses||0}\nNet Profit,${d.profit||0}\nROI,${d.roi||0}%\n`;
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `OBA_Report_${BIZ}_${new Date().toISOString().split('T')[0]}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function initPage() {
  buildNav();
  const u = await getCurrentUser();
  if (u) {
    const bizAccess = u.businessAccess || [];
    BIZ = bizAccess.includes('all') ? 'RENTAL' : (bizAccess[0] || 'RENTAL');
    document.getElementById('sidebarName').textContent = u.name;
    document.querySelector('.sidebar-user-role').textContent = 'Logged in as: ' + formatRole(u.role);
    document.getElementById('sidebarAvatar').textContent = u.name.charAt(0).toUpperCase();
  }
  document.getElementById('topbarTitle').textContent = BIZ + ' - Financial Reports';
  loadReports();
}

document.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
