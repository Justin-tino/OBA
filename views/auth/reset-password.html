<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — OBA System | PSAU</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { background: var(--black); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 0; margin: 0; font-family: var(--font-main); }
    .auth-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; width: 100%; background: var(--white); }
    .auth-right { padding: 48px 50px; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
    .auth-right-inner { max-width: 420px; width: 100%; text-align: center; }
    .auth-logo-wrap { text-align: center; margin-bottom: 28px; }
    .auth-logo-wrap img { width: 90px; height: 90px; object-fit: contain; margin: 0 auto; }
    .auth-right-title { font-size: 1.6rem; font-weight: 800; color: var(--black); margin-top: 16px; margin-bottom: 12px; }
    .auth-right-sub { font-size: 0.92rem; color: var(--gray-600); margin-bottom: 32px; line-height: 1.5; }
    .btn-submit {
      display: inline-flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #2d6a2e 0%, #3a8c3b 100%);
      color: var(--white); font-weight: 700; font-size: 0.95rem;
      padding: 13px 28px; border-radius: var(--radius-sm);
      text-decoration: none; border: none; cursor: pointer; width: 100%;
      box-sizing: border-box; transition: var(--transition);
    }
    .btn-submit:hover { background: linear-gradient(135deg, #236024 0%, #2d7a2e 100%); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .err-msg { background: var(--danger-light); color: var(--danger); padding: 12px 14px; border-radius: var(--radius); font-size: 0.85rem; margin-bottom: 16px; display: none; text-align: left; }
    .success-msg { background: var(--green-light); color: var(--green); padding: 12px 14px; border-radius: var(--radius); font-size: 0.85rem; margin-bottom: 16px; display: none; text-align: left; }
    .auth-link { font-size: 0.88rem; color: var(--gray-600); text-align: center; margin-top: 20px; }
    .auth-link a { color: var(--green); font-weight: 600; text-decoration: none; cursor: pointer; }
    .auth-link a:hover { color: var(--yellow-dark); }
    .input-pw-wrap { position: relative; }
    .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--gray-400); font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-right">
      <div class="auth-right-inner">
        <div class="auth-logo-wrap">
          <img src="/images/psaulogo.png" alt="PSAU Logo">
        </div>
        
        <h2 class="auth-right-title">Set New Password</h2>
        <p class="auth-right-sub">Please choose a secure new password for your account.</p>

        <div class="err-msg" id="errMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <div id="resetForm">
          <div class="form-group" style="text-align:left; margin-bottom:16px;">
            <label class="form-label">New Password</label>
            <div class="input-pw-wrap">
              <input type="password" id="newPassword" class="form-control" placeholder="Minimum 6 characters" required>
              <button type="button" class="pw-toggle" onclick="togglePw('newPassword')">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-group" style="text-align:left; margin-bottom:24px;">
            <label class="form-label">Confirm New Password</label>
            <div class="input-pw-wrap">
              <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your new password" required>
              <button type="button" class="pw-toggle" onclick="togglePw('confirmPassword')">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button class="btn-submit" id="btnSubmit" onclick="submitNewPassword()">Update Password</button>
        </div>

        <div class="auth-link">
          <a href="/login">Return to Login</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function togglePw(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    async function submitNewPassword() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errMsg = document.getElementById('errMsg');
      const successMsg = document.getElementById('successMsg');
      const btn = document.getElementById('btnSubmit');

      errMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!token) {
        errMsg.textContent = 'Invalid request. Reset token is missing.';
        errMsg.style.display = 'block';
        return;
      }

      if (!newPassword || newPassword.length < 6) {
        errMsg.textContent = 'Password must be at least 6 characters long.';
        errMsg.style.display = 'block';
        return;
      }

      if (newPassword !== confirmPassword) {
        errMsg.textContent = 'Passwords do not match.';
        errMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating Password...';

      try {
        const res = await fetch('/api/forgot-password/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await res.json();
        if (data.success) {
          successMsg.textContent = data.message + ' You will be redirected to the login page shortly.';
          successMsg.style.display = 'block';
          document.getElementById('resetForm').style.display = 'none';
          setTimeout(() => {
            window.location.href = '/login';
          }, 3000);
        } else {
          errMsg.textContent = data.message;
          errMsg.style.display = 'block';
        }
      } catch (err) {
        errMsg.textContent = 'Server error. Please try again.';
        errMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    }
  </script>
</body>
</html>
